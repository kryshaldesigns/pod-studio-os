<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pattern-Fill Text Generator — POD Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo+Black&family=Bebas+Neue&family=Bungee&family=Oswald:wght@700&family=Abril+Fatface&family=DM+Serif+Display&family=Permanent+Marker&family=Playfair+Display:wght@900&family=Fraunces:wght@900&family=DM+Sans:wght@400;600;700&display=swap"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#FAF7F0;color:#1a1a1a;min-height:100vh}
.header{background:#FAF7F0;border-bottom:2px solid #111;padding:14px 20px;display:flex;align-items:center;gap:12px}
.header-badge{background:#111;color:#FAF7F0;font-size:10px;font-weight:700;letter-spacing:0.08em;padding:3px 8px;border-radius:2px}
.layout{display:grid;grid-template-columns:260px 220px 1fr;height:calc(100vh - 57px);overflow:hidden}
.panel{border-right:2px solid #111;padding:14px;overflow-y:auto;display:flex;flex-direction:column;gap:10px}
.panel-title{font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#555;padding-bottom:8px;border-bottom:2px solid #111}
label{font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:#555;display:block;margin-bottom:4px}
input[type=text],textarea,select{width:100%;border:2px solid #111;padding:8px 10px;font-family:'DM Sans',sans-serif;font-size:13px;background:#fff;color:#111;outline:none}
input[type=text]:focus,textarea:focus,select:focus{border-color:#B84A1F}
textarea{resize:vertical;min-height:100px;line-height:1.5}
.btn{border:2px solid #111;background:#B84A1F;color:#fff;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;padding:9px 14px;cursor:pointer;letter-spacing:0.04em;text-transform:uppercase;width:100%}
.btn:hover{background:#9a3d18}
.btn-secondary{background:#FAF7F0;color:#111}
.btn-secondary:hover{background:#eee}
.btn-sm{padding:6px 10px;font-size:11px;width:auto}
.pattern-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.pattern-swatch{border:2px solid #999;cursor:pointer;aspect-ratio:1;overflow:hidden;transition:all 0.15s;position:relative}
.pattern-swatch:hover{border-color:#B84A1F}
.pattern-swatch.active{border:3px solid #B84A1F;transform:scale(1.05)}
.pattern-swatch svg,.pattern-swatch canvas{width:100%;height:100%;display:block}
.pattern-label{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.55);color:#fff;font-size:8px;font-weight:700;text-align:center;padding:2px 2px;letter-spacing:0.03em;text-transform:uppercase}
.upload-zone{border:2px dashed #999;padding:10px;text-align:center;cursor:pointer;background:#fff;font-size:11px;font-weight:600;color:#555}
.upload-zone:hover{border-color:#B84A1F}
.slider-row{display:flex;align-items:center;gap:8px}
.slider-row input[type=range]{flex:1;accent-color:#B84A1F}
.slider-val{font-size:11px;font-weight:700;min-width:32px;text-align:right}
.radio-group{display:flex;gap:0}
.radio-group button{flex:1;border:2px solid #111;border-right:none;background:#FAF7F0;font-family:'DM Sans',sans-serif;font-size:10px;font-weight:700;padding:6px 2px;cursor:pointer;text-transform:uppercase}
.radio-group button:last-child{border-right:2px solid #111}
.radio-group button.active{background:#111;color:#FAF7F0}
.color-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}
.color-swatch{width:24px;height:24px;border:2px solid #111;cursor:pointer;flex-shrink:0;transition:transform 0.15s}
.color-swatch:hover,.color-swatch.active{transform:scale(1.2);outline:2px solid #B84A1F;outline-offset:2px}
.preview-area{background:#e8e3d9;display:flex;flex-direction:column;overflow:hidden}
.preview-toolbar{background:#FAF7F0;border-bottom:2px solid #111;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.preview-grid{flex:1;overflow-y:auto;padding:16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;align-content:start}
.design-card{background:#fff;border:2px solid #111;padding:10px}
.design-label{font-size:10px;font-weight:700;color:#555;margin:6px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.empty-state{grid-column:1/-1;text-align:center;padding:60px 20px;color:#999;font-size:13px}
.section-div{border:none;border-top:2px solid #111;margin:2px 0}
</style>
</head>
<body>

<div class="header">
  <div style="font-size:20px">🦓</div>
  <h1 style="font-size:18px;font-weight:700">Pattern-Fill Text Generator</h1>
  <span class="header-badge">POD STUDIO</span>
  <a href="javascript:history.back()" style="margin-left:auto;font-size:12px;font-weight:700;color:#555;text-decoration:none;border:2px solid #111;padding:4px 10px">← Back to Studio</a>
</div>

<div class="layout">

  <!-- LEFT: Pattern & Slogans -->
  <div class="panel">
    <div class="panel-title">Pattern & Slogans</div>

    <div>
      <label>Pattern Presets</label>
      <div class="pattern-grid" id="patternGrid"></div>
    </div>

    <div>
      <label>Or Upload Custom Pattern</label>
      <div class="upload-zone" onclick="document.getElementById('patternFile').click()">
        📁 Click to upload PNG / JPG / WebP
      </div>
      <input type="file" id="patternFile" accept="image/png,image/jpeg,image/webp" style="display:none" onchange="handlePatternUpload(this)"/>
    </div>

    <div>
      <label>Pattern Scale <span class="slider-val" id="patScaleVal">100%</span></label>
      <input type="range" min="10" max="300" value="100" id="patScale" style="width:100%;accent-color:#B84A1F" oninput="document.getElementById('patScaleVal').textContent=this.value+'%';refreshPreviews()"/>
    </div>

    <div>
      <label>Pattern Offset X <span class="slider-val" id="patOXVal">0</span></label>
      <input type="range" min="-200" max="200" value="0" id="patOffsetX" style="width:100%;accent-color:#B84A1F" oninput="document.getElementById('patOXVal').textContent=this.value;refreshPreviews()"/>
    </div>

    <div>
      <label>Pattern Offset Y <span class="slider-val" id="patOYVal">0</span></label>
      <input type="range" min="-200" max="200" value="0" id="patOffsetY" style="width:100%;accent-color:#B84A1F" oninput="document.getElementById('patOYVal').textContent=this.value;refreshPreviews()"/>
    </div>

    <hr class="section-div"/>

    <div>
      <label>Slogans — one per line</label>
      <textarea id="slogans" placeholder="DARLIN'&#10;MAMA&#10;HOWDY&#10;Y'ALL&#10;HOT MESS&#10;WILD CHILD&#10;COWGIRL&#10;COUNTRY ROOTS"></textarea>
    </div>

    <div style="display:flex;gap:6px">
      <button class="btn btn-sm btn-secondary" onclick="savePreset()">Save Preset</button>
      <button class="btn btn-sm" onclick="generate()">⚡ Generate</button>
    </div>
  </div>

  <!-- MIDDLE: Text & Outline Controls -->
  <div class="panel">
    <div class="panel-title">Text & Outline</div>

    <div>
      <label>Font</label>
      <select id="font" onchange="refreshPreviews()">
        <option value="'Anton',sans-serif">Anton (Recommended)</option>
        <option value="'Archivo Black',sans-serif">Archivo Black</option>
        <option value="'Bebas Neue',sans-serif">Bebas Neue</option>
        <option value="'Bungee',sans-serif">Bungee</option>
        <option value="'Oswald',sans-serif">Oswald Bold</option>
        <option value="'Abril Fatface',serif">Abril Fatface</option>
        <option value="'DM Serif Display',serif">DM Serif Display</option>
        <option value="'Permanent Marker',cursive">Permanent Marker</option>
        <option value="'Playfair Display',serif">Playfair Display Black</option>
        <option value="'Fraunces',serif">Fraunces Black</option>
      </select>
    </div>

    <div>
      <label>Font Size <span class="slider-val" id="fontSizeVal">200px</span></label>
      <input type="range" min="60" max="500" value="200" id="fontSize" style="width:100%;accent-color:#B84A1F" oninput="document.getElementById('fontSizeVal').textContent=this.value+'px';refreshPreviews()"/>
    </div>

    <div>
      <label>Letter Spacing <span class="slider-val" id="spacingVal">0px</span></label>
      <input type="range" min="-20" max="60" value="0" id="spacing" style="width:100%;accent-color:#B84A1F" oninput="document.getElementById('spacingVal').textContent=this.value+'px';refreshPreviews()"/>
    </div>

    <div>
      <label>Text Transform</label>
      <div class="radio-group" id="transformGroup">
        <button onclick="setOpt('transform','none',this,'transformGroup')">None</button>
        <button class="active" onclick="setOpt('transform','uppercase',this,'transformGroup')" style="border-left:none">UPPER</button>
        <button onclick="setOpt('transform','lowercase',this,'transformGroup')" style="border-left:none">lower</button>
      </div>
    </div>

    <div>
      <label>Curve Effect</label>
      <select id="curveEffect" onchange="refreshPreviews()">
        <option value="straight">Straight</option>
        <option value="arch-up">Arch Up</option>
        <option value="arch-down">Arch Down</option>
      </select>
    </div>

    <div>
      <label>Curve Intensity <span class="slider-val" id="curveVal">40%</span></label>
      <input type="range" min="0" max="100" value="40" id="curveIntensity" style="width:100%;accent-color:#B84A1F" oninput="document.getElementById('curveVal').textContent=this.value+'%';refreshPreviews()"/>
    </div>

    <hr class="section-div"/>
    <div style="font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:#B84A1F">Outline</div>

    <div>
      <label>Outline Colour</label>
      <div class="color-row">
        <div class="color-swatch active" style="background:#ffffff;border-color:#aaa" data-color="#ffffff" onclick="setOutlineColor(this)"></div>
        <div class="color-swatch" style="background:#F5E6D3" data-color="#F5E6D3" onclick="setOutlineColor(this)"></div>
        <div class="color-swatch" style="background:#000000" data-color="#000000" onclick="setOutlineColor(this)"></div>
        <div class="color-swatch" style="background:#B84A1F" data-color="#B84A1F" onclick="setOutlineColor(this)"></div>
        <input type="color" value="#ffffff" style="width:24px;height:24px;border:2px solid #111;cursor:pointer;padding:0" onchange="state.outlineColor=this.value;refreshPreviews()"/>
      </div>
    </div>

    <div>
      <label>Outline Thickness <span class="slider-val" id="outlineVal">12px</span></label>
      <input type="range" min="0" max="80" value="12" id="outlineThick" style="width:100%;accent-color:#B84A1F" oninput="document.getElementById('outlineVal').textContent=this.value+'px';refreshPreviews()"/>
    </div>

    <hr class="section-div"/>

    <div>
      <label>Shirt Preview Background</label>
      <div class="radio-group" id="bgGroup">
        <button onclick="setOpt('bgMode','brown',this,'bgGroup')">Brown</button>
        <button class="active" onclick="setOpt('bgMode','black',this,'bgGroup')" style="border-left:none">Black</button>
        <button onclick="setOpt('bgMode','white',this,'bgGroup')" style="border-left:none">White</button>
      </div>
      <div style="font-size:10px;color:#999;margin-top:3px">Export is always transparent PNG</div>
    </div>
  </div>

  <!-- RIGHT: Preview Grid -->
  <div class="preview-area">
    <div class="preview-toolbar">
      <div style="font-size:12px;font-weight:700;color:#555" id="designCount">0 designs</div>
      <button class="btn btn-sm" onclick="downloadAll()" id="dlAllBtn" style="display:none">⬇ Download All (ZIP)</button>
    </div>
    <div class="preview-grid" id="previewGrid">
      <div class="empty-state">
        <div style="font-size:32px;margin-bottom:10px">🦓</div>
        Select a pattern, enter slogans, then hit <strong>Generate</strong>
      </div>
    </div>
  </div>
</div>

<script>
// ─── STATE ───
const state = {
  designs:[],
  activePatternName:'Leopard Print',
  activePatternDataUrl:null,
  outlineColor:'#ffffff',
  bgMode:'black',
  transform:'uppercase',
};

// ─── PRESET PATTERNS (drawn as SVG canvas data URLs) ───
const PRESETS = [
  {name:'Leopard Print', draw: drawLeopard},
  {name:'Cow Print', draw: drawCow},
  {name:'Buffalo Plaid', draw: drawPlaid},
  {name:'Camo Green', draw: drawCamo},
  {name:'Serape Stripes', draw: drawSerape},
  {name:'Sunflower', draw: drawSunflower},
  {name:'Wood Grain', draw: drawWood},
  {name:'Stars', draw: drawStars},
  {name:'Floral', draw: drawFloral},
  {name:'Western Geo', draw: drawGeo},
];

function drawLeopard(ctx, size){
  ctx.fillStyle='#C4922A'; ctx.fillRect(0,0,size,size);
  const spots=[{x:.2,y:.2},{x:.6,y:.1},{x:.85,y:.4},{x:.3,y:.6},{x:.7,y:.7},{x:.1,y:.8},{x:.5,y:.9},{x:.9,y:.85}];
  spots.forEach(s=>{
    const x=s.x*size,y=s.y*size,r=size*0.09;
    ctx.fillStyle='#1a0a00';
    // outer spots
    for(let a=0;a<6;a++){const ang=a*Math.PI/3;ctx.beginPath();ctx.ellipse(x+Math.cos(ang)*r*0.8,y+Math.sin(ang)*r*0.8,r*0.3,r*0.2,ang,0,Math.PI*2);ctx.fill();}
    ctx.fillStyle='#C4922A';ctx.beginPath();ctx.ellipse(x,y,r*0.4,r*0.35,0,0,Math.PI*2);ctx.fill();
  });
}
function drawCow(ctx,size){
  ctx.fillStyle='#ffffff';ctx.fillRect(0,0,size,size);
  const splotches=[{x:.15,y:.2,rx:.18,ry:.14},{x:.65,y:.15,rx:.2,ry:.16},{x:.4,y:.55,rx:.22,ry:.17},{x:.8,y:.6,rx:.15,ry:.12},{x:.2,y:.75,rx:.17,ry:.13},{x:.6,y:.85,rx:.2,ry:.11}];
  ctx.fillStyle='#111';
  splotches.forEach(s=>{ctx.beginPath();ctx.ellipse(s.x*size,s.y*size,s.rx*size,s.ry*size,Math.random()*0.5,0,Math.PI*2);ctx.fill();});
}
function drawPlaid(ctx,size){
  ctx.fillStyle='#e8e8e8';ctx.fillRect(0,0,size,size);
  const w=size/4;
  ctx.fillStyle='#b5121b';
  for(let i=0;i<4;i++){ctx.fillRect(i*w,0,w,size);ctx.fillRect(0,i*w,size,w);}
  ctx.fillStyle='#111';ctx.globalAlpha=0.3;
  for(let i=0;i<4;i++){ctx.fillRect(i*w+w/2-2,0,4,size);ctx.fillRect(0,i*w+w/2-2,size,4);}
  ctx.globalAlpha=1;
}
function drawCamo(ctx,size){
  ctx.fillStyle='#5a6e2e';ctx.fillRect(0,0,size,size);
  const blobs=[{x:.1,y:.1,r:.2,c:'#3a4a1a'},{x:.5,y:.2,r:.18,c:'#2a3510'},{x:.8,y:.1,r:.15,c:'#4a5a25'},{x:.2,y:.5,r:.22,c:'#2a3510'},{x:.6,y:.55,r:.19,c:'#3a4a1a'},{x:.1,y:.8,r:.17,c:'#6a7a3a'},{x:.8,y:.75,r:.2,c:'#2a3510'},{x:.4,y:.85,r:.16,c:'#4a5a25'}];
  blobs.forEach(b=>{ctx.fillStyle=b.c;ctx.beginPath();ctx.arc(b.x*size,b.y*size,b.r*size,0,Math.PI*2);ctx.fill();});
}
function drawSerape(ctx,size){
  const colors=['#e63946','#f4a261','#e9c46a','#2a9d8f','#264653','#e76f51','#a8dadc'];
  const stripeW=size/colors.length;
  colors.forEach((c,i)=>{ctx.fillStyle=c;ctx.fillRect(i*stripeW,0,stripeW,size);});
}
function drawSunflower(ctx,size){
  ctx.fillStyle='#4a7c2f';ctx.fillRect(0,0,size,size);
  [[.3,.3],[.75,.2],[.15,.7],[.7,.7],[.5,.9],[.9,.5]].forEach(([px,py])=>{
    const x=px*size,y=py*size,r=size*0.12;
    ctx.fillStyle='#f4c430';
    for(let a=0;a<8;a++){const ang=a*Math.PI/4;ctx.beginPath();ctx.ellipse(x+Math.cos(ang)*r,y+Math.sin(ang)*r,r*0.4,r*0.2,ang,0,Math.PI*2);ctx.fill();}
    ctx.fillStyle='#4a2800';ctx.beginPath();ctx.arc(x,y,r*0.4,0,Math.PI*2);ctx.fill();
  });
}
function drawWood(ctx,size){
  const grad=ctx.createLinearGradient(0,0,size,0);
  grad.addColorStop(0,'#8B5E3C');grad.addColorStop(0.3,'#A0714F');grad.addColorStop(0.6,'#7A4F2E');grad.addColorStop(1,'#8B5E3C');
  ctx.fillStyle=grad;ctx.fillRect(0,0,size,size);
  ctx.strokeStyle='rgba(60,30,0,0.25)';ctx.lineWidth=2;
  for(let i=0;i<6;i++){ctx.beginPath();ctx.moveTo(0,i*size/6+5);ctx.bezierCurveTo(size*.3,i*size/6-8,size*.7,i*size/6+8,size,i*size/6+2);ctx.stroke();}
}
function drawStars(ctx,size){
  ctx.fillStyle='#1a1a4e';ctx.fillRect(0,0,size,size);
  ctx.fillStyle='#ffffff';
  [[.2,.1],[.5,.2],[.8,.1],[.1,.5],[.4,.4],[.7,.5],[.9,.3],[.3,.7],[.6,.8],[.15,.85],[.85,.75]].forEach(([px,py])=>{
    const x=px*size,y=py*size,r=size*0.04;
    ctx.beginPath();
    for(let i=0;i<5;i++){const a=i*Math.PI*2/5-Math.PI/2;ctx.lineTo(x+Math.cos(a)*r,y+Math.sin(a)*r);const b=a+Math.PI/5;ctx.lineTo(x+Math.cos(b)*r*0.4,y+Math.sin(b)*r*0.4);}
    ctx.closePath();ctx.fill();
  });
}
function drawFloral(ctx,size){
  ctx.fillStyle='#f5e6d0';ctx.fillRect(0,0,size,size);
  [[.2,.2],[.6,.1],[.85,.5],[.3,.6],[.7,.75],[.1,.85],[.5,.95]].forEach(([px,py])=>{
    const x=px*size,y=py*size,r=size*0.07;
    const petalColors=['#d4687a','#e8a4b0','#c45a6a'];
    for(let a=0;a<6;a++){const ang=a*Math.PI/3;ctx.fillStyle=petalColors[a%3];ctx.beginPath();ctx.ellipse(x+Math.cos(ang)*r,y+Math.sin(ang)*r,r*0.55,r*0.3,ang,0,Math.PI*2);ctx.fill();}
    ctx.fillStyle='#f4c430';ctx.beginPath();ctx.arc(x,y,r*0.3,0,Math.PI*2);ctx.fill();
  });
}
function drawGeo(ctx,size){
  ctx.fillStyle='#1a1a2e';ctx.fillRect(0,0,size,size);
  const cols=['#c45c2a','#e8a030','#2a6e8a','#ffffff'];
  const n=6;const s=size/n;
  for(let r=0;r<n;r++)for(let c=0;c<n;c++){
    if((r+c)%3===0){ctx.fillStyle=cols[(r+c/2|0)%cols.length];ctx.beginPath();ctx.moveTo(c*s+s/2,r*s);ctx.lineTo(c*s+s,r*s+s/2);ctx.lineTo(c*s+s/2,r*s+s);ctx.lineTo(c*s,r*s+s/2);ctx.closePath();ctx.fill();}
  }
}

function makePatternDataUrl(drawFn, size=200){
  const canvas=document.createElement('canvas');canvas.width=size;canvas.height=size;
  const ctx=canvas.getContext('2d');drawFn(ctx,size);
  return canvas.toDataURL('image/png');
}

// Build pattern grid
function buildPatternGrid(){
  const grid=document.getElementById('patternGrid');
  grid.innerHTML = PRESETS.map((p,i)=>{
    const url=makePatternDataUrl(p.draw,100);
    return `<div class="pattern-swatch${i===0?' active':''}" onclick="selectPattern('${p.name}',${i})" id="pswatch_${i}" title="${p.name}">
      <img src="${url}" style="width:100%;height:100%;display:block;object-fit:cover"/>
      <div class="pattern-label">${p.name.split(' ')[0]}</div>
    </div>`;
  }).join('');
  // Set default
  state.activePatternName = PRESETS[0].name;
  state.activePatternDataUrl = makePatternDataUrl(PRESETS[0].draw, 400);
}
buildPatternGrid();

function selectPattern(name, idx){
  document.querySelectorAll('.pattern-swatch').forEach(s=>s.classList.remove('active'));
  document.getElementById(`pswatch_${idx}`).classList.add('active');
  state.activePatternName = name;
  state.activePatternDataUrl = makePatternDataUrl(PRESETS[idx].draw, 400);
  refreshPreviews();
}

function handlePatternUpload(input){
  const file=input.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    state.activePatternDataUrl=e.target.result;
    state.activePatternName='custom';
    document.querySelectorAll('.pattern-swatch').forEach(s=>s.classList.remove('active'));
    refreshPreviews();
  };
  reader.readAsDataURL(file);
}

// ─── CONTROLS ───
function setOpt(key,val,el,groupId){
  state[key]=val;
  document.getElementById(groupId).querySelectorAll('button').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  refreshPreviews();
}
function setOutlineColor(el){
  document.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('active'));
  el.classList.add('active');
  state.outlineColor=el.dataset.color;
  refreshPreviews();
}
function applyTransform(t){
  if(state.transform==='uppercase')return t.toUpperCase();
  if(state.transform==='lowercase')return t.toLowerCase();
  return t;
}

// ─── GENERATE ───
function generate(){
  const raw=document.getElementById('slogans').value.trim().split('\n').filter(Boolean);
  if(!raw.length){alert('Enter at least one slogan');return;}
  if(!state.activePatternDataUrl){alert('Select a pattern first');return;}
  state.designs=raw.map((s,i)=>({id:i,slogan:s.trim(),slug:s.trim().toLowerCase().replace(/[^a-z0-9]+/g,'-')}));
  renderGrid();
}
function refreshPreviews(){if(state.designs.length)renderGrid();}

function renderGrid(){
  const grid=document.getElementById('previewGrid');
  document.getElementById('designCount').textContent=state.designs.length+' design'+(state.designs.length!==1?'s':'');
  document.getElementById('dlAllBtn').style.display=state.designs.length?'':'none';
  if(!state.designs.length){grid.innerHTML='<div class="empty-state"><div style="font-size:32px;margin-bottom:10px">🦓</div>No designs yet</div>';return;}
  grid.innerHTML=state.designs.map((d,i)=>`
    <div class="design-card">
      <div style="width:100%;aspect-ratio:5/6;cursor:pointer" onclick="enlargePreview(${i})">
        ${buildSVG(d,300,360)}
      </div>
      <div class="design-label">${applyTransform(d.slogan)}</div>
      <div style="display:flex;gap:6px">
        <button class="btn btn-secondary btn-sm" style="flex:1;font-size:10px" onclick="downloadOne(${i})">⬇ PNG</button>
      </div>
    </div>
  `).join('');
}

// ─── SVG BUILDER (pattern fill via SVG <pattern> element) ───
function buildSVG(d, W, H){
  const font=document.getElementById('font').value;
  const fontSize=Math.round(parseInt(document.getElementById('fontSize').value)*W/4500);
  const spacing=parseInt(document.getElementById('spacing').value)*W/4500;
  const outlineThick=parseInt(document.getElementById('outlineThick').value)*W/4500;
  const curveEffect=document.getElementById('curveEffect').value;
  const curve=parseInt(document.getElementById('curveIntensity').value)/100;
  const patScale=parseInt(document.getElementById('patScale').value)/100;
  const patOX=parseInt(document.getElementById('patOffsetX').value)*W/4500;
  const patOY=parseInt(document.getElementById('patOffsetY').value)*H/5400;
  const text=applyTransform(d.slogan);
  const cx=W/2, cy=H/2;
  const textY=cy+fontSize*0.35;

  // Background
  const bgColor=state.bgMode==='white'?'#ffffff':state.bgMode==='brown'?'#5C3B28':'#000000';

  // Pattern tile size
  const tileSize=Math.round(200*patScale*W/4500);

  // Text path for curves
  const pathId=`tp_${d.id}_${W}`;
  let textEl='';
  if(curveEffect==='straight'){
    textEl=`<text x="${cx}" y="${textY}" text-anchor="middle" dominant-baseline="auto" font-family="${font}" font-size="${fontSize}" letter-spacing="${spacing}" fill="url(#pat_${d.id}_${W})" paint-order="stroke" stroke="${state.outlineColor}" stroke-width="${outlineThick}" stroke-linejoin="round">${text}</text>`;
  } else {
    const r=W*(0.45+curve*0.35);
    const arcY=textY;
    const sweep=curveEffect==='arch-up'?1:0;
    const pathD=`M ${cx-r} ${arcY} A ${r} ${r} 0 0 ${sweep} ${cx+r} ${arcY}`;
    textEl=`<defs><path id="${pathId}" d="${pathD}"/></defs>
    <text font-family="${font}" font-size="${fontSize}" letter-spacing="${spacing}" fill="url(#pat_${d.id}_${W})" paint-order="stroke" stroke="${state.outlineColor}" stroke-width="${outlineThick}" stroke-linejoin="round">
      <textPath href="#${pathId}" startOffset="50%" text-anchor="middle">${text}</textPath>
    </text>`;
  }

  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${W} ${H}" width="${W}" height="${H}">
    <defs>
      <pattern id="pat_${d.id}_${W}" patternUnits="userSpaceOnUse" width="${tileSize}" height="${tileSize}" patternTransform="translate(${patOX},${patOY})">
        <image href="${state.activePatternDataUrl}" x="0" y="0" width="${tileSize}" height="${tileSize}" preserveAspectRatio="xMidYMid slice"/>
      </pattern>
    </defs>
    <rect width="${W}" height="${H}" fill="${bgColor}"/>
    ${textEl}
  </svg>`;
}

function buildHiresSVG(d){return buildSVG(d,4500,5400);}

async function svgToPngBlob(svgStr,w,h){
  await document.fonts.ready;
  return new Promise(res=>{
    const img=new Image();
    // For pattern fill we need to serialize carefully
    const blob=new Blob([svgStr],{type:'image/svg+xml;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    img.onload=()=>{
      const c=document.createElement('canvas');c.width=w;c.height=h;
      const ctx=c.getContext('2d');
      ctx.drawImage(img,0,0,w,h);
      URL.revokeObjectURL(url);
      c.toBlob(b=>res(b),'image/png');
    };
    img.onerror=()=>{
      // Fallback: use XMLSerializer
      const serialized=new XMLSerializer().serializeToString(
        new DOMParser().parseFromString(svgStr,'image/svg+xml').documentElement
      );
      const b64=btoa(unescape(encodeURIComponent(serialized)));
      const img2=new Image();img2.crossOrigin='anonymous';
      img2.onload=()=>{
        const c=document.createElement('canvas');c.width=w;c.height=h;
        c.getContext('2d').drawImage(img2,0,0,w,h);
        c.toBlob(b=>res(b),'image/png');
      };
      img2.src='data:image/svg+xml;base64,'+b64;
    };
    img.src=url;
  });
}

async function downloadOne(idx){
  const d=state.designs[idx];
  const svg=buildHiresSVG(d);
  const blob=await svgToPngBlob(svg,4500,5400);
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`${state.activePatternName.toLowerCase().replace(/\s+/g,'-')}-${d.slug}.png`;a.click();
  URL.revokeObjectURL(url);
}

async function downloadAll(){
  const btn=document.getElementById('dlAllBtn');
  btn.textContent='Generating…';btn.disabled=true;
  const zip=new JSZip();
  for(const d of state.designs){
    const blob=await svgToPngBlob(buildHiresSVG(d),4500,5400);
    zip.file(`${state.activePatternName.toLowerCase().replace(/\s+/g,'-')}-${d.slug}.png`,blob);
  }
  const zb=await zip.generateAsync({type:'blob'});
  const url=URL.createObjectURL(zb);
  const a=document.createElement('a');a.href=url;a.download=`${state.activePatternName.toLowerCase().replace(/\s+/g,'-')}-pattern-designs.zip`;a.click();
  URL.revokeObjectURL(url);
  btn.textContent='⬇ Download All (ZIP)';btn.disabled=false;
}

function enlargePreview(idx){
  const d=state.designs[idx];
  const o=document.createElement('div');
  o.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:999;display:flex;align-items:center;justify-content:center;cursor:pointer';
  o.innerHTML=`<div style="max-width:500px;width:90%">${buildSVG(d,450,540)}</div>`;
  o.onclick=()=>o.remove();document.body.appendChild(o);
}

function savePreset(){
  const slogans=document.getElementById('slogans').value;
  if(!slogans.trim()){alert('Enter slogans first');return;}
  const saved=JSON.parse(localStorage.getItem('pattern_presets')||'[]');
  saved.unshift({name:state.activePatternName,slogans,patternDataUrl:state.activePatternDataUrl});
  localStorage.setItem('pattern_presets',JSON.stringify(saved.slice(0,6)));
  alert('Preset saved ✓');
}
